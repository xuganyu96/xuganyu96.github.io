# docker compose --env-file ~/Shared/SelfHosting/.env up

name: homelab

services:
  audiobookshelf:
    depends_on:
      - caddy
    environment:
      - TZ=America/Toronto
    image: ghcr.io/advplyr/audiobookshelf:latest
    networks:
      - homelab
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - /home/brucexu/Shared/SelfHosting/audiobookshelf/audiobooks:/audiobooks
      - /home/brucexu/Shared/SelfHosting/audiobookshelf/podcasts:/podcasts
      - /home/brucexu/Shared/SelfHosting/audiobookshelf/config:/config
      - /home/brucexu/Shared/SelfHosting/audiobookshelf/metadata:/metadata
  backrest:
    depends_on:
      - caddy
    environment:
      - BACKREST_DATA=/data
      - BACKREST_CONFIG=/config/config.json
      - XDG_CACHE_HOME=/cache
      - TMPDIR=/tmp
      - TZ=America/Toronto
    hostname: "backrest.thinkcentre.crustaceanlab.com"
    image: ghcr.io/garethgeorge/backrest:v1.12.1
    networks:
      - homelab
    # ports:
    #   - "9898:9898"
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - /home/brucexu/Shared/SelfHosting/backrest/data:/data
      - /home/brucexu/Shared/SelfHosting/backrest/config:/config
      - /home/brucexu/Shared/SelfHosting/backrest/cache:/cache
      - /home/brucexu/Shared/SelfHosting/backrest/tmp:/tmp
      - /etc/passwd:/etc/passwd:ro
      # - /home/brucexu/Shared/SelfHosting/backrest/rclone:/root/.config/rclone
      - /home/brucexu/Shared:/userdata
  caddy:
    # image: caddy:2.11.3-alpine
    build:
      context: .
      dockerfile: caddy.Dockerfile
    environment:
      - CADDY_CLOUDFLARE_TOKEN=${CADDY_CLOUDFLARE_TOKEN}
    networks:
      - homelab
    user: "1000:1000"
    ports:
      - 80:80
      - 443:443
    restart: unless-stopped
    volumes:
      - /home/brucexu/Shared/SelfHosting/caddy/conf:/etc/caddy
      - /home/brucexu/Shared/SelfHosting/caddy/data:/data
      - /home/brucexu/.ssl:/ssl:ro
  copyparty:
    image: ghcr.io/9001/copyparty-ac
    user: "1000:1000"
    restart: unless-stopped
    networks:
      - homelab
    volumes:
      - /home/brucexu:/w
      - /home/brucexu/Shared/SelfHosting/copyparty/config:/cfg
    healthcheck:
      # hide it from logs with "/._" so it matches the default --lf-url filter 
      test: ["CMD-SHELL", "wget --spider -q 127.0.0.1:3923/?reset=/._"]
      interval: 1m
      timeout: 2s
      retries: 5
      start_period: 15s
  immich-server:
    container_name: immich_server
    user: "1000:1000"
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    networks:
      - homelab
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - /home/brucexu/Shared/SelfHosting/.env
    # ports:
    #   - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false
  immich-machine-learning:
    container_name: immich_machine_learning
    networks:
      - homelab
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    volumes:
      - model-cache:/cache
    env_file:
      - /home/brucexu/Shared/SelfHosting/.env
    restart: always
    healthcheck:
      disable: false
  redis:
    container_name: immich_redis
    user: "1000:1000"
    networks:
      - homelab
    image: docker.io/valkey/valkey:9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
  database:
    container_name: immich_postgres
    user: "1000:1000"
    networks:
      - homelab
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    env_file:
      - /home/brucexu/Shared/SelfHosting/.env
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

volumes:
  model-cache:

networks:
  homelab:
